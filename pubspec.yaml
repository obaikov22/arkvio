name: arkvio
description: "Arkvio — local document storage for accountants"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  drift: ^2.22.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  intl: ^0.20.0
  uuid: ^4.4.0
  open_file: ^3.3.2
  dio: ^5.7.0
  package_info_plus: ^8.1.0
  syncfusion_flutter_pdf: ^33.1.44
  flutter_local_notifications: ^18.0.0
  workmanager: ^0.9.0
  flutter_timezone: ^5.0.0
  timezone: ^0.9.4
  archive: ^3.6.1
  share_plus: ^10.0.0
  shared_preferences: ^2.3.0
  permission_handler: ^11.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F563F"
  adaptive_icon_foreground: "icon.png"
